name: Publish Package

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package version
        run: |
          PACKAGE_VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch for package version ${PACKAGE_VERSION}."
          elif [ "${GITHUB_REF_NAME}" != "v${PACKAGE_VERSION}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version v${PACKAGE_VERSION}."
            exit 1
          fi

      - name: Run tests
        run: npm test

      - name: Verify publish payload
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish --access public
